<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valhalla Fitness · Vitalab</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0a0f;
      --panel: #120707;
      --red: #cc0000;
      --red-soft: #ff4444;
      --text: #e8e0d0;
      --muted: #888;
      --line: #2a0000;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(139, 0, 0, 0.18), transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(30, 30, 80, 0.22), transparent 50%),
        var(--bg);
      color: var(--text);
      font-family: Georgia, serif;
      text-align: center;
    }

    main {
      width: min(560px, 100%);
      padding: 32px 24px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, #180606, #09090d);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.65), 0 0 32px rgba(139, 0, 0, 0.18);
    }

    .runes {
      color: #4a1818;
      letter-spacing: 0.45em;
      font-size: 0.75rem;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      color: var(--red);
      font-size: clamp(2rem, 9vw, 3.4rem);
      line-height: 0.95;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(204, 0, 0, 0.7), 0 0 32px rgba(139, 0, 0, 0.45);
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--red-soft);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    p {
      margin: 22px auto;
      max-width: 40rem;
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      display: inline-block;
      padding: 12px 18px;
      border: 1px solid #8b0000;
      border-radius: 4px;
      background: linear-gradient(135deg, #1a0505, #3a0909);
      color: var(--red-soft);
      text-decoration: none;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      box-shadow: 0 0 16px rgba(139, 0, 0, 0.35);
    }

    a:hover {
      border-color: var(--red-soft);
      box-shadow: 0 0 26px rgba(255, 68, 68, 0.35);
    }
  </style>
</head>
<body>
  <main>
    <div class="runes">ᚨ ᚱ ᚲ ᚺ ᛟ</div>
    <h1>Valhalla Fitness</h1>
    <div class="subtitle">Vitalab · Mansanito</div>
    <p>
      App fitness personalizada con estética heavy/vikinga, gamificación semanal,
      rutina visual y motivación hecha a medida.
    </p>
    <a href="mansanito-valhalla-3.html">Abrir aplicación</a>
  </main>
</body>
</html>
